# ============================================================
# Institutional Crypto Futures Intelligence Platform
# Docker Compose orchestration: PostgreSQL + Redis + app
# ============================================================

version: "3.9"

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 — primary persistent store
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: platform
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform-net

  # ----------------------------------------------------------
  # Redis 7 — cache + rate limit windows + pub/sub
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ----------------------------------------------------------
  # Application — the platform itself (24/7 loop)
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:${POSTGRES_PASSWORD:-platform}@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app/app:ro  # Mount source for hot reload in dev
      - app_logs:/app/logs
    networks:
      - platform-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # (Optional) uvicorn API server — runs the FastAPI app
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:${POSTGRES_PASSWORD:-platform}@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "app.asgi:app", "--host", "0.0.0.0", "--port", "8081", "--workers", "1"]
    ports:
      - "8081:8081"
    volumes:
      - ./app:/app/app:ro
    networks:
      - platform-net
    profiles:
      - api  # only started with --profile api

volumes:
  postgres_data:
  redis_data:
  app_logs:

networks:
  platform-net:
    driver: bridge
