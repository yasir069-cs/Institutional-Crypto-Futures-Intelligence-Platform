# ============================================================
# Institutional Crypto Futures Intelligence Platform
# Docker Compose — production-grade single-instance deployment
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up -d
#   3. Visit http://localhost:8080/ (or your server's IP)
# ============================================================

version: "3.9"

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 — primary persistent store
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_pass}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform-net

  # ----------------------------------------------------------
  # Redis 7 — cache + rate limit windows + pub/sub
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ----------------------------------------------------------
  # Application — the platform itself (24/7 pipeline + API)
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override to use Docker network services
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform_pass}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
      - app_data:/app/data
    networks:
      - platform-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_data:

networks:
  platform-net:
    driver: bridge
